<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WS4010 Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 12px;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        input,
        button,
        textarea {
            font-size: 14px;
        }

        input,
        textarea {
            padding: 6px;
        }

        button {
            padding: 6px 10px;
        }

        #log {
            width: 100%;
            height: 55vh;
        }

        .ok {
            color: #0a7f2e;
        }

        .bad {
            color: #b00020;
        }

        .muted {
            color: #666;
        }
    </style>
</head>

<body>
    <h3>WS4010 Browser Monitor</h3>
    <div class="row">
        <label>WS URL <input id="url" size="36" value="ws://shackmate.router:4010/" /></label>
        <button id="connectBtn">Connect</button>
        <button id="closeBtn">Close</button>
        <span id="state" class="muted">disconnected</span>
    </div>

    <div class="row">
        <button data-send='{"command":"help"}'>Send help</button>
        <button data-send='{"command":"settings"}'>Send settings</button>
        <button data-send='{"command":"settings","verbose":true}'>Send settings verbose</button>
        <button data-send='status'>Send status(text)</button>
        <button id="clearBtn">Clear</button>
    </div>

    <div class="row" style="width:100%;">
        <textarea id="payload" style="width:100%;height:72px;">{"command":"settings"}</textarea>
    </div>
    <div class="row">
        <button id="sendBtn">Send custom payload</button>
    </div>

    <textarea id="log" readonly></textarea>

    <script>
        let ws = null;
        const logEl = document.getElementById('log');
        const stateEl = document.getElementById('state');
        const urlEl = document.getElementById('url');
        const payloadEl = document.getElementById('payload');

        function now() {
            return new Date().toLocaleTimeString();
        }

        function addLog(line) {
            logEl.value += `[${now()}] ${line}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setState(text, cls) {
            stateEl.textContent = text;
            stateEl.className = cls || 'muted';
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            const url = urlEl.value.trim();
            ws = new WebSocket(url);
            addLog(`CONNECT ${url}`);

            ws.onopen = () => {
                setState('connected', 'ok');
                setTimeout(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        sendRaw('{"command":"settings"}');
                    }
                }, 250);
            };
            ws.onclose = () => setState('disconnected', 'muted');
            ws.onerror = () => setState('error', 'bad');
            ws.onmessage = (ev) => {
                let parsed = null;
                try { parsed = JSON.parse(ev.data); } catch { }
                if (parsed && typeof parsed === 'object') {
                    const tag = `${parsed.type || 'msg'}${parsed.action ? ':' + parsed.action : ''}`;
                    addLog(`RECV ${tag} ${JSON.stringify(parsed)}`);
                } else {
                    addLog(`RECV RAW ${ev.data}`);
                }
            };
        }

        function sendRaw(text) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('SEND FAILED (not connected)');
                return;
            }
            ws.send(text);
            addLog(`SENT ${text}`);
        }

        document.getElementById('connectBtn').onclick = connect;
        document.getElementById('closeBtn').onclick = () => { if (ws) ws.close(); };
        document.getElementById('clearBtn').onclick = () => { logEl.value = ''; };
        document.getElementById('sendBtn').onclick = () => sendRaw(payloadEl.value.trim());

        document.querySelectorAll('button[data-send]').forEach(btn => {
            btn.onclick = () => sendRaw(btn.getAttribute('data-send'));
        });

        connect();
    </script>
</body>

</html>
