services:
  kiwiscan:
    image: kiwiscan-local:latest
    pull_policy: never
    container_name: kiwiscan
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "4010:4010/tcp"
      - "4010:4010/udp"
      - "4020:4020"
    environment:
      PORT: "4020"
      TZ: "America/New_York"
      AUTO_SETUP: "0"
      AUTO_RELOAD: "0"
      NO_RESTART: "1"
      KIWI_SCAN_WS4010: "1"
      KIWI_SCAN_UDP4010: "1"
      KIWISCAN_STRICT_DIGITAL_SLOT_ENFORCEMENT: "0"
      KIWISCAN_DIGITAL_REMAP_GRACE_S: "45"
      KIWISCAN_STALE_RECOVERY_MISMATCH_WINDOW_S: "45"
      KIWISCAN_MISMATCH_AUTOKICK_REQUIRED_CHECKS: "3"
      KIWISCAN_MISMATCH_AUTOKICK_COOLDOWN_S: "60"
      KIWISCAN_RESET_ALL_ON_RECONCILE: "0"
      KIWISCAN_RESET_ALL_ON_BAND_CHANGE: "1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./config:/opt/kiwiscan/config
      - ./outputs:/opt/kiwiscan/outputs
